<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR VRM Pose AR</title>
    <style>
        /* 背景を完全に透明化してカメラ映像を映す */
        html, body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            background-color: transparent !important; 
        }
        
        /* 3Dを描画するキャンバスを最背面に配置 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: transparent !important;
        }

        /* ARモード中に上に重なるUI（最前面に配置） */
        #overlay-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none; 
            flex-direction: column;
            gap: 10px;
            align-items: center;
            width: 90%;
            pointer-events: none; /* 下のタップを邪魔しない */
        }

        /* ボタン等のUI要素はタップできるようにする */
        .ui-element {
            pointer-events: auto;
        }

        .btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #pose-options {
            display: flex;
            gap: 10px;
        }
        #info-text {
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }

        /* デバッグ用ログ表示エリア */
        #debug-log {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
            z-index: 200;
            display: none;
            white-space: pre-wrap;
        }
    </style>
    <!-- 三大ライブラリ（Three.js, GLTFLoader, three-vrm）を読み込み -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <!-- エラー表示用エリア -->
    <div id="debug-log"></div>

    <!-- AR画面に覆いかぶさるUI -->
    <div id="overlay-ui">
        <div id="info-text" class="ui-element">床をスキャンして画面をタップし、モデルを設置してください</div>
        <div id="pose-options" class="ui-element" style="display: none;">
            <button class="btn" id="btn-pose1">ポーズ1（手を上げる）</button>
            <button class="btn" id="btn-pose2">ポーズ2（気をつけ）</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRM, VRMUtils } from '@pixiv/three-vrm';

        let camera, scene, renderer;
        let reticle; 
        let currentVrm = null;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // あなたのVRMファイルを読み込むURL
        const vrmUrl = 'https://raw.githubusercontent.com/Onocul/AR-shikatsun/main/shikatsun.vrm';

        // スマホ画面にエラーを出すための関数
        function showLog(message) {
            const logDiv = document.getElementById('debug-log');
            logDiv.style.display = 'block';
            logDiv.innerText += message + '\n';
        }

        window.addEventListener('error', (e) => {
            showLog(`エラー: ${e.message}`);
        });

        init();

        async function init() {
            try {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2.5);
                light.position.set(0.5, 1, 0.25);
                scene.add(light);

                renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true,
                    preserveDrawingBuffer: true 
                });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0); 
                renderer.xr.enabled = true; 
                document.body.appendChild(renderer.domElement);

                const overlayContainer = document.getElementById('overlay-ui');
                const arButton = ARButton.createButton(renderer, {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay'],
                    domOverlay: { root: overlayContainer }
                });
                document.body.appendChild(arButton);

                renderer.xr.addEventListener('sessionstart', () => {
                    overlayContainer.style.display = 'flex';
                });

                reticle = new THREE.Mesh(
                    new THREE.RingGeometry(0.1, 0.13, 32).rotateX(-Math.PI / 2),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
                );
                reticle.matrixAutoUpdate = false;
                reticle.visible = false;
                scene.add(reticle);

                const controller = renderer.xr.getController(0);
                controller.addEventListener('select', onPlaceModel);
                scene.add(controller);

                document.getElementById('btn-pose1').addEventListener('click', (e) => { e.stopPropagation(); applyPose(1); });
                document.getElementById('btn-pose2').addEventListener('click', (e) => { e.stopPropagation(); applyPose(2); });

                window.addEventListener('resize', onWindowResize);
                renderer.setAnimationLoop(renderLoop);
            } catch (err) {
                showLog(`初期化失敗: ${err.message}`);
            }
        }

        async function onPlaceModel() {
            if (!reticle.visible) return;

            if (currentVrm) {
                reticle.matrix.decompose(currentVrm.scene.position, currentVrm.scene.quaternion, currentVrm.scene.scale);
            } else {
                document.getElementById('info-text').innerText = 'モデルを読み込み中...';
                
                const loader = new GLTFLoader();
                loader.load(vrmUrl, async (gltf) => {
                    try {
                        VRMUtils.removeUnnecessaryJoints(gltf.scene);
                        
                        // 【ここを修正！】最新のthree-vrm規格に合わせた安全な読み込み
                        const vrm = gltf.userData.vrm;
                        if (!vrm) {
                            showLog('エラー: GLTFファイル内にVRMデータが見つかりません');
                            return;
                        }
                        currentVrm = vrm;

                        reticle.matrix.decompose(vrm.scene.position, vrm.scene.quaternion, vrm.scene.scale);
                        vrm.scene.scale.set(0.6, 0.6, 0.6); 
                        
                        scene.add(vrm.scene);

                        document.getElementById('info-text').innerText = '設置完了！ポーズを選んでね';
                        document.getElementById('pose-options').style.display = 'flex';
                    } catch (vrmErr) {
                        showLog(`VRM変換失敗: ${vrmErr.message}`);
                    }
                }, 
                (progress) => {}, 
                (error) => { 
                    showLog(`ファイル読み込み失敗: ${error.message || 'URLエラー'}`);
                    document.getElementById('info-text').innerText = '読み込みエラーが発生しました'; 
                });
            }
        }

        function applyPose(poseId) {
            if (!currentVrm) return;

            const leftShoulder = currentVrm.humanoid.getRawBoneNode('leftUpperArm');
            const rightShoulder = currentVrm.humanoid.getRawBoneNode('rightUpperArm');

            if (poseId === 1) {
                if (leftShoulder) leftShoulder.rotation.z = 2.0;
                if (rightShoulder) rightShoulder.rotation.z = -2.0;
            } else if (poseId === 2) {
                if (leftShoulder) leftShoulder.rotation.z = 0;
                if (rightShoulder) rightShoulder.rotation.z = 0;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function renderLoop(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            if (currentVrm) {
                currentVrm.update(0.016);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
