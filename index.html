<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR VRM Perfect AR</title>
    <style>
        /* 背景を完全に透明化してカメラ映像を映す */
        html, body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: transparent !important; 
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: transparent !important;
        }

        /* 【新設計】WebXRと競合しない、画面の最前面に固定するボタンエリア */
        #ui-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999; /* 何があっても一番上に表示 */
            display: none; /* AR開始前は隠す */
            gap: 15px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid #00ff00; /* 認識リングとお揃いの緑 */
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* エラーが起きた時だけ出すエリア */
        #debug-log {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
            z-index: 10000;
            display: none;
            white-space: pre-wrap;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="debug-log"></div>

    <div id="ui-container">
        <button class="btn" id="btn-pose1">🙌 バンザイ</button>
        <button class="btn" id="btn-pose2">🧍 気をつけ</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let camera, scene, renderer;
        let reticle; 
        let currentVrm = null;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        const vrmUrl = 'https://raw.githubusercontent.com/Onocul/AR-shikatsun/main/shikatsun.vrm';

        function showLog(message) {
            const logDiv = document.getElementById('debug-log');
            logDiv.style.display = 'block';
            logDiv.innerText += message + '\n';
        }

        window.addEventListener('error', (e) => {
            showLog(`エラー: ${e.message}`);
        });

        init();

        async function init() {
            try {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2.5);
                light.position.set(0.5, 1, 0.25);
                scene.add(light);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0); 
                renderer.xr.enabled = true; 
                document.body.appendChild(renderer.domElement);

                // 安全にARを起動（エラーの起きやすいdomOverlayは使わない方式を維持）
                const arButton = ARButton.createButton(renderer, {
                    requiredFeatures: ['hit-test']
                });
                document.body.appendChild(arButton);

                // ARが始まったら、HTML独自の仕組みでボタンをフワッと画面に出す
                renderer.xr.addEventListener('sessionstart', () => {
                    document.getElementById('ui-container').style.display = 'flex';
                });
                renderer.xr.addEventListener('sessionend', () => {
                    document.getElementById('ui-container').style.display = 'none';
                });

                reticle = new THREE.Mesh(
                    new THREE.RingGeometry(0.1, 0.13, 32).rotateX(-Math.PI / 2),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
                );
                reticle.matrixAutoUpdate = false;
                reticle.visible = false;
                scene.add(reticle);

                const controller = renderer.xr.getController(0);
                controller.addEventListener('select', onPlaceModel);
                scene.add(controller);

                // ボタンを押したときにポーズが変わるイベント（タップが突き抜けない対策済）
                document.getElementById('btn-pose1').addEventListener('beforexrselect', (e) => e.preventDefault());
                document.getElementById('btn-pose1').addEventListener('click', (e) => { e.stopPropagation(); applyPose(1); });
                
                document.getElementById('btn-pose2').addEventListener('beforexrselect', (e) => e.preventDefault());
                document.getElementById('btn-pose2').addEventListener('click', (e) => { e.stopPropagation(); applyPose(2); });

                window.addEventListener('resize', onWindowResize);
                renderer.setAnimationLoop(renderLoop);
            } catch (err) {
                showLog(`初期化失敗: ${err.message}`);
            }
        }

        async function onPlaceModel(e) {
            // タップした場所がUIボタンの上なら、モデルの設置処理を無視する（バグ防止）
            if (e && e.target && e.target.tagName === 'BUTTON') return;
            if (!reticle.visible) return;

            if (currentVrm) {
                reticle.matrix.decompose(currentVrm.scene.position, currentVrm.scene.quaternion, currentVrm.scene.scale);
            } else {
                const loader = new GLTFLoader();
                loader.register((parser) => new VRMLoaderPlugin(parser));

                loader.load(vrmUrl, async (gltf) => {
                    try {
                        VRMUtils.removeUnnecessaryJoints(gltf.scene);
                        const vrm = gltf.userData.vrm;
                        if (!vrm) return;
                        currentVrm = vrm;

                        reticle.matrix.decompose(vrm.scene.position, vrm.scene.quaternion, vrm.scene.scale);
                        vrm.scene.scale.set(0.5, 0.5, 0.5); 
                        
                        scene.add(vrm.scene);
                    } catch (vrmErr) {
                        showLog(`変換失敗: ${vrmErr.message}`);
                    }
                }, null, null);
            }
        }

        // ポーズを動かす処理
        function applyPose(poseId) {
            if (!currentVrm) return;

            // 肩の関節を取得
            const leftShoulder = currentVrm.humanoid.getRawBoneNode('leftUpperArm');
            const rightShoulder = currentVrm.humanoid.getRawBoneNode('rightUpperArm');

            if (poseId === 1) {
                // ポーズ1: バンザイ
                if (leftShoulder) leftShoulder.rotation.z = 2.3;
                if (rightShoulder) rightShoulder.rotation.z = -2.3;
            } else if (poseId === 2) {
                // ポーズ2: 気をつけ
                if (leftShoulder) leftShoulder.rotation.z = 0;
                if (rightShoulder) rightShoulder.rotation.z = 0;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function renderLoop(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            if (currentVrm) {
                currentVrm.update(0.016);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
