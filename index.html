<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR VRM Anime AR</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: transparent !important; 
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: transparent !important;
        }
        #debug-log {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
            z-index: 200;
            display: none;
            white-space: pre-wrap;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="debug-log"></div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let camera, scene, renderer;
        let reticle; 
        let currentVrm = null;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // アニメーション再生中かどうかを判定するフラグ
        let isWaving = false;

        const vrmUrl = 'https://raw.githubusercontent.com/Onocul/AR-shikatsun/main/shikatsun.vrm';

        function showLog(message) {
            const logDiv = document.getElementById('debug-log');
            logDiv.style.display = 'block';
            logDiv.innerText += message + '\n';
        }

        window.addEventListener('error', (e) => {
            showLog(`エラー: ${e.message}`);
        });

        init();

        async function init() {
            try {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2.5);
                light.position.set(0.5, 1, 0.25);
                scene.add(light);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0); 
                renderer.xr.enabled = true; 
                document.body.appendChild(renderer.domElement);

                // エラーの出ない最も安全なAR起動設定
                const arButton = ARButton.createButton(renderer, {
                    requiredFeatures: ['hit-test']
                });
                document.body.appendChild(arButton);

                reticle = new THREE.Mesh(
                    new THREE.RingGeometry(0.1, 0.13, 32).rotateX(-Math.PI / 2),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
                );
                reticle.matrixAutoUpdate = false;
                reticle.visible = false;
                scene.add(reticle);

                const controller = renderer.xr.getController(0);
                controller.addEventListener('select', onScreenTap);
                scene.add(controller);

                window.addEventListener('resize', onWindowResize);
                renderer.setAnimationLoop(renderLoop);
            } catch (err) {
                showLog(`初期化失敗: ${err.message}`);
            }
        }

        // 画面タップ時のイベント
        async function onScreenTap() {
            // 1. まだアバターがいない場合は設置する
            if (!currentVrm) {
                if (!reticle.visible) return;

                const loader = new GLTFLoader();
                loader.register((parser) => new VRMLoaderPlugin(parser));

                loader.load(vrmUrl, async (gltf) => {
                    try {
                        VRMUtils.removeUnnecessaryJoints(gltf.scene);
                        const vrm = gltf.userData.vrm;
                        if (!vrm) return;
                        currentVrm = vrm;

                        reticle.matrix.decompose(vrm.scene.position, vrm.scene.quaternion, vrm.scene.scale);
                        vrm.scene.scale.set(0.5, 0.5, 0.5); 
                        
                        scene.add(vrm.scene);
                    } catch (vrmErr) {
                        showLog(`変換失敗: ${vrmErr.message}`);
                    }
                }, null, null);
            } 
            // 2. すでにアバターがいる場合は、タップで手を振る！
            else {
                playWaveAnimation();
            }
        }

        // 手を振るアニメーション関数
        function playWaveAnimation() {
            // すでに手を振っている最中なら、多重実行を防ぐために無視する
            if (isWaving) return;
            isWaving = true;

            // ボーン（関節）の取得
            const rightShoulder = currentVrm.humanoid.getRawBoneNode('rightUpperArm');
            const rightElbow = currentVrm.humanoid.getRawBoneNode('rightLowerArm');

            if (!rightShoulder || !rightElbow) {
                isWaving = false;
                return;
            }

            // アニメーション開始時の腕の初期位置（少し右手を上げる）
            rightShoulder.rotation.z = -1.2; 
            rightShoulder.rotation.x = 0.3;

            const startTime = Date.now();

            const animate = () => {
                const elapsed = (Date.now() - startTime) / 1000; // 秒数に変換

                if (elapsed < 3.0) { // 3秒間手を振る
                    // Math.sinを使って肘をキュッキュッと左右に振る（数字を大きくすると早くなります）
                    rightElbow.rotation.x = Math.sin(elapsed * 12) * 0.4;
                    requestAnimationFrame(animate);
                } else {
                    // 3秒経ったら自然な姿勢（気をつけ）に戻す
                    rightShoulder.rotation.z = 0;
                    rightShoulder.rotation.x = 0;
                    rightElbow.rotation.x = 0;
                    isWaving = false; // 再びタップ可能にする
                }
            };

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function renderLoop(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            // VRMのまばたきや視線などの内部アップデート
            if (currentVrm) {
                currentVrm.update(0.016);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
