<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR VRM Tap Pose AR</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: transparent !important; 
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: transparent !important;
        }
        #debug-log {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
            z-index: 200;
            display: none;
            white-space: pre-wrap;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="debug-log"></div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let camera, scene, renderer;
        let reticle; 
        let currentVrm = null;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // ポーズの状態を管理するカウンター
        let posePattern = 0; 

        const vrmUrl = 'https://raw.githubusercontent.com/Onocul/AR-shikatsun/main/shikatsun.vrm';

        function showLog(message) {
            const logDiv = document.getElementById('debug-log');
            logDiv.style.display = 'block';
            logDiv.innerText += message + '\n';
        }

        window.addEventListener('error', (e) => {
            showLog(`エラー: ${e.message}`);
        });

        init();

        async function init() {
            try {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2.5);
                light.position.set(0.5, 1, 0.25);
                scene.add(light);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0); 
                renderer.xr.enabled = true; 
                document.body.appendChild(renderer.domElement);

                // 【フリーズ対策】一番カメラが起動しやすかったシンプルモードに戻す
                const arButton = ARButton.createButton(renderer, {
                    requiredFeatures: ['hit-test']
                });
                document.body.appendChild(arButton);

                reticle = new THREE.Mesh(
                    new THREE.RingGeometry(0.1, 0.13, 32).rotateX(-Math.PI / 2),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
                );
                reticle.matrixAutoUpdate = false;
                reticle.visible = false;
                scene.add(reticle);

                const controller = renderer.xr.getController(0);
                controller.addEventListener('select', onScreenTap);
                scene.add(controller);

                window.addEventListener('resize', onWindowResize);
                renderer.setAnimationLoop(renderLoop);
            } catch (err) {
                showLog(`初期化失敗: ${err.message}`);
            }
        }

        // 画面がタップされたときの処理
        async function onScreenTap() {
            // 1. まだモデルがいない場合は、床のリングの位置に新しく設置する
            if (!currentVrm) {
                if (!reticle.visible) return;

                const loader = new GLTFLoader();
                loader.register((parser) => new VRMLoaderPlugin(parser));

                loader.load(vrmUrl, async (gltf) => {
                    try {
                        VRMUtils.removeUnnecessaryJoints(gltf.scene);
                        const vrm = gltf.userData.vrm;
                        if (!vrm) return;
                        currentVrm = vrm;

                        reticle.matrix.decompose(vrm.scene.position, vrm.scene.quaternion, vrm.scene.scale);
                        vrm.scene.scale.set(0.5, 0.5, 0.5); 
                        
                        scene.add(vrm.scene);
                    } catch (vrmErr) {
                        showLog(`変換失敗: ${vrmErr.message}`);
                    }
                }, null, null);
            } 
            // 2. すでにモデルがいる場合は、タップするたびにポーズを切り替える！
            else {
                posePattern = (posePattern + 1) % 3; // 0, 1, 2 をループ
                applyPose(posePattern);
            }
        }

        // ポーズを変化させる関数（3パターン用意しました！）
        function applyPose(patternId) {
            if (!currentVrm) return;

            const leftShoulder = currentVrm.humanoid.getRawBoneNode('leftUpperArm');
            const rightShoulder = currentVrm.humanoid.getRawBoneNode('rightUpperArm');

            if (patternId === 0) {
                // パターン0: 気をつけ（元に戻る）
                if (leftShoulder) leftShoulder.rotation.z = 0;
                if (rightShoulder) rightShoulder.rotation.z = 0;
            } else if (patternId === 1) {
                // パターン1: バンザイ！
                if (leftShoulder) leftShoulder.rotation.z = 2.3;
                if (rightShoulder) rightShoulder.rotation.z = -2.3;
            } else if (patternId === 2) {
                // パターン2: ちょこんと横に手を広げるパタパタポーズ
                if (leftShoulder) leftShoulder.rotation.z = 1.0;
                if (rightShoulder) rightShoulder.rotation.z = -1.0;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function renderLoop(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            if (currentVrm) {
                currentVrm.update(0.016);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
